name: "api_v2"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_v2_api
    env_file:
      - .env
    environment:
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000,http://192.168.0.101:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:5173,http://127.0.0.1:5173
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/api_v2
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      EXAM_LAYOUT_DEBUG_DIR: /app/tmp/exam-layout-debug
      EXAM_OCR_LANGUAGES: por,eng
      EXAM_VISION_MODEL: gpt-4o
      EXAM_VISION_DEBUG_DIR: /tmp/exam-vision-debug
      MINIO_PUBLIC_ENDPOINT: http://minio:9000
      BUCKET_PUBLIC_BASE_URL: http://localhost:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      BUCKET_NAME: iasmim
    ports:
      - "8000:8000"
    volumes:
      - ./tmp:/app/tmp
      - ./tmp/exam-vision-debug:/tmp/exam-vision-debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: api_v2_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/api_v2
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      EXAM_LAYOUT_DEBUG_DIR: /app/tmp/exam-layout-debug
      EXAM_OCR_LANGUAGES: por,eng
      EXAM_VISION_MODEL: gpt-4o
      EXAM_VISION_DEBUG_DIR: /tmp/exam-vision-debug
      MINIO_PUBLIC_ENDPOINT: http://minio:9000
      BUCKET_PUBLIC_BASE_URL: http://localhost:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      BUCKET_NAME: iasmim
    volumes:
      - ./tmp:/app/tmp
      - ./tmp/exam-vision-debug:/tmp/exam-vision-debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  frontend:
    image: node:22-alpine
    container_name: api_v2_frontend
    working_dir: /app
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"]
    environment:
      PORT: 3000
      VITE_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: api_v2_postgres
    ports:
      - "15434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_v2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: api_v2_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: api_v2_minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: api_v2_minio_init
    depends_on:
      - minio
    entrypoint:
      [
        "sh",
        "-c",
        "until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done && mc mb --ignore-existing local/iasmim",
      ]

volumes:
  minio_data:
  postgres_data:
  redis_data:
  frontend_node_modules:
