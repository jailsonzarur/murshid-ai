name: CI/CD Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [developer]

jobs:
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck and production build
        run: npm run build

  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 \
            libgl1 \
            libmagic1 \
            libsm6 \
            libxext6 \
            poppler-utils \
            tesseract-ocr \
            tesseract-ocr-por

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run lint
        run: uv run ruff check src

      - name: Run typecheck
        run: uv run basedpyright src

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-with-at-least-32-bytes
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          OPENAI_API_KEY: test-openai-key
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest src/tests -n auto

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t iasmim-frontend:${{ github.sha }} frontend

      - name: Build backend image
        run: docker build -t iasmim-backend:${{ github.sha }} backend

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: docker-build
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/developer'

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_BACKEND_SERVICE_ID }} --detach

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: docker-build
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/developer'

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_FRONTEND_SERVICE_ID }} --detach
